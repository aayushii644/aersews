<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Concrete Strength Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light, clean background gradients */
            --bg1: #f0f4f8;
            --bg2: #d9e2ec;
            --bg3: #bcccdc;

            /* Card & UI Elements */
            --card: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --primary: #2563eb;
            --primary2: #0891b2;
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* Card Container */
        .card {
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            animation: fade .6s ease-out;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; }
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 15px;
        }

        /* Form Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .group {
            margin-bottom: 28px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .group h3 {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Inputs & Labels */
        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        /* Predict Button */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(45deg, var(--primary), var(--primary2));
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        /* Results Display */
        .result-container {
            margin-top: 25px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsiveness */
        @media(max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .card { padding: 25px; }
            header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h1>Concrete Strength Predictor</h1>
        <p>Adjust the mix design parameters below to estimate compressive strength.</p>
    </header>

    <form id="form">
        <div class="group">
            <h3>Binders & Water</h3>
            <div class="grid">
                <div class="field"><label>Cement (kg/m³)</label><input type="number" step="any" name="cement" value="300"></div>
                <div class="field"><label>Slag (kg/m³)</label><input type="number" step="any" name="slag" value="0"></div>
                <div class="field"><label>Fly Ash (kg/m³)</label><input type="number" step="any" name="flyash" value="0"></div>
                <div class="field"><label>Water (kg/m³)</label><input type="number" step="any" name="water" value="180"></div>
            </div>
        </div>

        <div class="group">
            <h3>Aggregates</h3>
            <div class="grid">
                <div class="field"><label>Coarse Aggregate (kg/m³)</label><input type="number" step="any" name="coarse" value="1000"></div>
                <div class="field"><label>Fine Aggregate (kg/m³)</label><input type="number" step="any" name="fine" value="800"></div>
            </div>
        </div>

        <div class="group">
            <h3>Additives & Curing</h3>
            <div class="grid">
                <div class="field"><label>Superplasticizer (kg/m³)</label><input type="number" step="any" name="sp" value="5"></div>
                <div class="field"><label>Age (Days)</label><input type="number" name="age" value="28"></div>
            </div>
        </div>

        <button id="btn" type="submit">Predict Strength</button>
    </form>

    <div class="result-container">
        <div id="result" class="result"></div>
    </div>
</div>

<script>
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Collect form data
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // UI State: Loading
        btn.disabled = true;
        btn.innerHTML = "Calculating <span class='spinner'></span>";
        result.innerHTML = "";

        try {
            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const json = await res.json();

            if(json.success) {
                result.innerHTML = `Estimated Strength: ${json.prediction} MPa`;
            } else {
                result.innerHTML = "⚠️ Prediction failed. Please check inputs.";
                result.style.color = "#ef4444";
            }
        } catch (error) {
            result.innerHTML = "Connection Error";
            result.style.color = "#ef4444";
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Predict Strength";
        }
    });
</script>

</body>
</html>
